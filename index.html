<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ammai</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="page">
    <section class="hero">
      <div class="stage">
        <img
          src="ammai.png"
          alt="Ammai"
          class="mother-image"
        />

        <div class="bird-controls">
          <button id="birdButton" class="bird-button" aria-pressed="false">
            Listen
          </button>

          <div id="birdCard" class="bird-card" aria-live="polite">
            <img id="birdImage" src="" alt="" class="bird-image" />

            <div class="bird-card-text">
              <div id="birdName" class="bird-name"></div>
              <div id="birdNote" class="bird-note"></div>
            </div>

            <button id="nextBirdButton" class="next-bird-button" aria-label="Play another bird">
              ›
            </button>
          </div>
        </div>

        <div id="birdOverlay" class="bird-overlay" aria-hidden="true">
          <button id="closeOverlayButton" class="close-overlay-button" aria-label="Close bird image">
            ×
          </button>

          <div class="bird-overlay-inner">
            <img id="largeBirdImage" src="" alt="" class="large-bird-image" />
            <div id="largeBirdName" class="large-bird-name"></div>
            <div id="largeBirdNote" class="large-bird-note"></div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
