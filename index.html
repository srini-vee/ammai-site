<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ammai</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page-shell">
    <section class="hero">
      <div class="portrait-wrap" aria-hidden="true">
        <!-- Replace ammai.png with your actual background/portrait image file name if different -->
        <img src="ammai.png" alt="" class="portrait" />
      </div>

      <div class="content-card">
        <p class="eyebrow">அம்மை</p>
        <h1>Ammai</h1>
        <p class="subtitle">A quiet tribute to memory, kindness, birds, flowers, and care.</p>

        <p class="body-copy">
          This page is a small beginning — a place to hold fragments of love, memory,
          and the gentle presence of nature.
        </p>

        <div class="controls">
          <button id="birdButton" class="bird-button" type="button" aria-pressed="false">
            <span id="buttonIcon">♪</span>
            <span id="buttonText">Play birdsong</span>
          </button>
        </div>

        <div id="birdCard" class="bird-card hidden" aria-live="polite">
          <img id="birdImage" src="" alt="" />
          <div class="bird-info">
            <p id="birdName" class="bird-name"></p>
            <p id="birdNote" class="bird-note"></p>
          </div>
        </div>
      </div>
    </section>
  </main>

  <audio id="birdAudio" preload="none"></audio>
  <script src="script.js"></script>
</body>
</html>
